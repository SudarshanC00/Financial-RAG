name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Lint & Type Check Frontend ─────────────────────────────────────
  frontend-checks:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

  # ─── Lint & Validate Backend ────────────────────────────────────────
  backend-checks:
    name: Backend Lint & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install fastapi uvicorn python-multipart
          pip install ruff

      - name: Lint with Ruff
        run: ruff check . --select E,W,F,I --ignore E501

      - name: Validate imports
        run: python -c "from api import app; print('✅ API imports OK')"

  # ─── Build & Push Docker Image ─────────────────────────────────────
  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [frontend-checks, backend-checks]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Deploy Backend ─────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Deploy to Render
        # Option A: Render auto-deploys from Docker image
        # Render watches the repo and rebuilds automatically.
        # This step is a placeholder — configure the Render webhook below.
        run: |
          echo "🚀 Backend deployment triggered"
          # Uncomment to use Render deploy hook:
          # curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

          # Uncomment to use Railway:
          # curl -X POST "https://backboard.railway.app/graphql/v2" \
          #   -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
          #   -H "Content-Type: application/json" \
          #   -d '{"query":"mutation { deploymentRestart(id: \"${{ secrets.RAILWAY_SERVICE_ID }}\") { id } }"}'
